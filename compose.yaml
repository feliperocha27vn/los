name: los

services:
  postgres:
    image: postgres:17-alpine
    container_name: los-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-los}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD é obrigatório}
      POSTGRES_DB: ${POSTGRES_DB:-los}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-los} -d ${POSTGRES_DB:-los}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - los-net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: los-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-los}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-los}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required - run openssl rand -hex 32}
      COFRE_JWT_SECRET: ${COFRE_JWT_SECRET:?COFRE_JWT_SECRET required - run openssl rand -hex 32}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    networks:
      - los-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: los-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - los-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
    name: los-postgres-data

networks:
  los-net:
    name: los-net
    driver: bridge
