name: los

services:
  postgres:
    image: postgres:17-alpine
    container_name: los-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-los}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-los}
      POSTGRES_DB: ${POSTGRES_DB:-los}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-los} -d ${POSTGRES_DB:-los}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - los-net

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: los-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-los}@postgres:5432/${POSTGRES_DB:-los}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret}
      COFRE_JWT_SECRET: ${COFRE_JWT_SECRET:-change-me-cofre-secret}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-feliperocha.dev27@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-on-first-login}
      ADMIN_PIN: ${ADMIN_PIN:-123456}
      ADMIN_NAME: ${ADMIN_NAME:-Felipe}
    ports:
      - "${API_PORT:-3000}:3333"
    networks:
      - los-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
    name: los-postgres-data-v3

networks:
  los-net:
    name: los-net
    driver: bridge
